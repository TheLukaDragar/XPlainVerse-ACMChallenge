name: Build and push Ljubljana (cu121) container

# Slurm / Apptainer-friendly tags: `latest-slurm`, `sha-<40hex>-slurm`
# Image is built from docker/Dockerfile.lj (PyTorch cu121 + matching FlashAttention).

on:
  push:
    branches: [main, master]
    paths:
      - 'docker/Dockerfile.lj'
      - 'docker/Dockerfile'
      - 'evaluation/env/xplainverse_eval_env.txt'
      - '.dockerignore'
      - '.github/workflows/container-lj.yml'
  workflow_dispatch:
    inputs:
      ms_swift_ref:
        description: ms-swift git ref (branch, tag, or commit)
        required: false
        default: main

permissions:
  contents: read
  packages: write

jobs:
  build-push-lj:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR must be lowercase)
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest-slurm,enable={{is_default_branch}}
            type=sha,prefix=sha-,suffix=-slurm

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.lj
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MS_SWIFT_REF=${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.ms_swift_ref != '' && github.event.inputs.ms_swift_ref || 'main') || 'main' }}
